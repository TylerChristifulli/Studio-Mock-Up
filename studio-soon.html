<!DOCTYPE html>
<html lang="en">
<head>

<title>FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="studio.css" />
<style>
  .soon{max-width:560px;margin:80px auto;text-align:center;}

  .soon .ic .material-icons{font-size:36px;color:var(--text-3);}

    <a class="btn primary" href="studio-home.html"><span class="material-icons">arrow_back</span>Back to Self-Paced</a>
  </div></div>

<script>STUDIO_PAGE='';</script>
<script src="studio-shell.js"></script>

const t=new URLSearchParams(location.search).get('t');
if(t) document.getElementById('title').textContent=decodeURIComponent(t);
</script>
