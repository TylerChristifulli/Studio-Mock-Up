<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classroom — FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="studio.css" />
<style>
  .crumb{font-size:12.5px;color:var(--text-3);margin-bottom:10px;}
  .cls{display:grid;grid-template-columns:1fr 320px;gap:30px;align-items:start;}
  .accred{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 18px;}
  .player{background:#000;border:1px solid var(--line);border-radius:12px;height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .player .pbtn{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .player .pbtn .material-icons{font-size:40px;color:#fff;}
  .meta{font-size:14px;color:var(--text-2);font-weight:300;}
  .meta b{color:var(--text);font-weight:500;}
  .sec{margin-top:18px;}
  .sec h4{font-size:14px;color:var(--text);margin:0 0 8px;font-weight:500;}
  .sec ol{margin:0;padding-left:20px;color:var(--text-2);font-size:13.5px;font-weight:300;}
  .sec ol li{margin-bottom:7px;}
  .stepper{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:8px;position:sticky;top:84px;}
  .step{display:flex;gap:12px;padding:14px 12px;border-radius:10px;cursor:pointer;}
  .step:hover{background:var(--surface-2);}
  .step .n{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;background:var(--surface-2);color:var(--text-3);}
  .step.active .n{background:var(--green);color:#06210a;}
  .step.done .n{background:rgba(102,187,106,.2);color:var(--green);}
  .step .st{font-size:13.5px;}
  .step .sd{font-size:12px;color:var(--text-3);margin-top:3px;}
  .step.active{background:var(--surface-2);}
  .stepacts{display:flex;gap:10px;margin-top:10px;padding-left:38px;}
  .lnk{font-size:13px;color:var(--text-2);cursor:pointer;padding:7px 0;}
  @media(max-width:840px){.cls{grid-template-columns:1fr;}.stepper{position:static;}}
</style>
</head>
<body>
<template id="main">
  <div class="page">
    <div class="crumb"><a href="studio-home.html">Self-Paced</a> &nbsp;›&nbsp; Airway / Respiratory / Ventilation &nbsp;›&nbsp; Understanding COPD</div>
    <div class="cls">
      <div>
        <h1 class="h1" style="font-family:Roboto">Understanding COPD</h1>
        <div class="accred">
          <span class="chip">ANCC</span><span class="chip">CAPCE</span>
          <span class="chip">Kentucky (CE Broker)</span><span class="chip">Tennessee (CE Broker)</span><span class="chip">Virginia</span>
        </div>
        <div class="player"><div class="pbtn"><span class="material-icons">play_arrow</span></div></div>
        <div class="meta"><b>Hour Type:</b> Airway, Respiratory, Ventilation (0.5 Hour F3 CE)</div>
        <div class="sec"><h4>Description</h4>
          <div class="meta" style="font-weight:300">This course reviews the fundamentals of COPD pathophysiology and treatments for the COPD patient.</div></div>
        <div class="sec"><h4>Objectives</h4>
          <ol>
            <li>Define the core pathophysiologic mechanisms of COPD, including airflow limitation, gas trapping, and V/Q mismatch.</li>
            <li>Identify appropriate evidence-based treatments for COPD in scenario-based clinical questions.</li>
            <li>Analyze COPD scenarios to determine treatment priorities and justify the sequence of interventions.</li>
          </ol></div>
        <div class="sec"><h4>Instructor</h4><div class="meta" style="font-weight:300">James Ownbey</div></div>
        <div class="sec"><h4>References</h4>
          <ol><li>Biondi-Zoccai, G., et al. (2011). Evidence reviews in mechanical support. <em>HSR Proceedings.</em></li>
          <li>GOLD Report (2024). Global Strategy for Prevention, Diagnosis and Management of COPD.</li></ol></div>
      </div>
      <div>
        <div class="stepper" id="stepper"></div>
      </div>
    </div>
  </div>
</template>
<script>STUDIO_PAGE='home';</script>
<script src="studio-shell.js"></script>
<script>
const STEPS=[
  ["Understanding COPD","COPD pathophysiology and treatment.","active"],
  ["Understanding COPD","Treatment priorities & scenarios.",""],
  ["Understanding COPD Quiz","3 questions · pass to earn CE.",""]
];
let cur=0;
function render(){
  document.getElementById('stepper').innerHTML = STEPS.map((s,i)=>{
    const cls = i<cur?'done':(i===cur?'active':'');
    const acts = i===cur?`<div class="stepacts"><span class="lnk" onclick="go(${i-1})">${i>0?'‹ Back':''}</span><button class="btn primary" onclick="go(${i+1})">${i<STEPS.length-1?'Next':'Finish'} <span class="material-icons">arrow_forward</span></button></div>`:'';
    return `<div class="step ${cls}" onclick="jump(${i})"><span class="n">${i<cur?'✓':i+1}</span><div><div class="st">${s[0]}</div>${i===cur?`<div class="sd">${s[1]}</div>`:''}</div></div>${acts}`;
  }).join('');
}
function go(i){ if(i<0)return; if(i>=STEPS.length){alert('Course complete — certificate issued (mock).');return;} cur=i; render(); }
function jump(i){ cur=i; render(); }
render();
</script>
</body>
</html>
