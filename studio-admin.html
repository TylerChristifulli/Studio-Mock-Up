<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="studio.css" />
<style>
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .stat .v{font-size:28px;font-weight:500;}
  .stat .l{font-size:12px;color:var(--text-3);margin-top:4px;}
  .qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .q{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s;}
  .q:hover{border-color:var(--line-2);}
  .q .ic{width:42px;height:42px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .q .ic .material-icons{color:var(--green);}
  .q .t{font-size:15px;font-weight:500;}
  .q .d{font-size:12.5px;color:var(--text-3);margin-top:3px;}
  @media(max-width:840px){.stats{grid-template-columns:repeat(2,1fr);}.qgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<template id="main">
  <div class="page">
    <h1 class="h1">Admin</h1>
    <p class="lead">Overview of your platform and quick access to management tools.</p>
    <div class="stats">
      <div class="stat"><div class="v" style="color:var(--info)">3,482</div><div class="l">Active students</div></div>
      <div class="stat"><div class="v" style="color:var(--yellow)">208</div><div class="l">Courses</div></div>
      <div class="stat"><div class="v" style="color:var(--green)">12,940</div><div class="l">Certificates issued</div></div>
      <div class="stat"><div class="v" style="color:var(--info)">2</div><div class="l">Special Certifications</div></div>
    </div>
    <div class="rowhead"><h2>Quick actions</h2></div>
    <div class="qgrid" id="q"></div>
  </div>
</template>
<script>STUDIO_PAGE='admin';</script>
<script src="studio-shell.js"></script>
<script>
const Q=[
  ["workspace_premium","Special Certifications","Create & manage IBSC/BCEN renewals","studio-manage.html"],
  ["add_circle","Create a course","Add a new self-paced course","studio-create.html"],
  ["group","Students","View enrollments & progress","studio-soon.html?t=Students"],
  ["assignment","Assignments","Assign courses to agencies","studio-soon.html?t=Assignments"],
  ["insights","Reports","CE hours, completions, exports","studio-soon.html?t=Reports"],
  ["tune","Manage catalog","Courses, series, categories","studio-manage.html"]
];
document.getElementById('q').innerHTML=Q.map(([ic,t,d,h])=>`
  <a class="q" href="${h}"><div class="ic"><span class="material-icons">${ic}</span></div>
  <div><div class="t">${t}</div><div class="d">${d}</div></div></a>`).join('');
</script>
</body>
</html>
