<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage — FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="studio.css" />
<style>
  .certlist{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
  .cert{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:16px 18px;cursor:pointer;transition:border-color .15s;}
  .cert:hover{border-color:var(--line-2);}
  .cert .nm{font-size:15px;font-weight:500;}
  .cert .c{font-size:12.5px;color:var(--text-3);}
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .m{display:flex;gap:13px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s;}
  .m:hover{border-color:var(--line-2);}
  .m .ic{width:40px;height:40px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .m .ic .material-icons{color:var(--info);}
  .m .t{font-size:14.5px;font-weight:500;} .m .d{font-size:12px;color:var(--text-3);}
  @media(max-width:840px){.certlist,.mgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<template id="main">
  <div class="page">
    <h1 class="h1">Manage</h1>
    <p class="lead">Edit the catalog, certifications, and everything students see.</p>

    <div class="rowhead"><h2>Special Certifications</h2>
      <a class="btn primary" style="padding:8px 16px;font-size:13px" href="admin-create-certification.html"><span class="material-icons">add</span>Create Special Certification</a></div>
    <div class="certlist">
      <a class="cert" href="admin-create-certification.html"><span class="nm">IBSC 100-Hour Renewal</span><span class="c">80 Courses ›</span></a>
      <a class="cert" href="admin-create-certification.html"><span class="nm">IBSC 40-Hour Renewal</span><span class="c">29 Courses ›</span></a>
    </div>

    <div class="rowhead"><h2>Catalog</h2></div>
    <div class="mgrid" id="m"></div>
  </div>
</template>
<script>STUDIO_PAGE='manage';</script>
<script src="studio-shell.js"></script>
<script>
const M=[
  ["video_library","Courses","208 published","studio-soon.html?t=Manage%20Courses"],
  ["playlist_play","Series","12 series","studio-soon.html?t=Manage%20Series"],
  ["category","Categories","8 categories","studio-soon.html?t=Categories"],
  ["videocam","Live Classes","Schedule & recordings","studio-live.html"],
  ["assignment","Assignments","Agency assignments","studio-soon.html?t=Manage%20Assignments"],
  ["group","Students & Agencies","Enrollments","studio-soon.html?t=Students"]
];
document.getElementById('m').innerHTML=M.map(([ic,t,d,h])=>`
  <a class="m" href="${h}"><div class="ic"><span class="material-icons">${ic}</span></div>
  <div><div class="t">${t}</div><div class="d">${d}</div></div></a>`).join('');
</script>
</body>
</html>
