<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Events — FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="studio.css" />
<style>
  .egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .ev{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .ev .art{height:120px;display:flex;align-items:flex-end;padding:14px;font-weight:700;font-size:18px;}
  .ev .b{padding:14px 16px;}
  .ev .t{font-size:15px;font-weight:500;}
  .ev .m{font-size:12.5px;color:var(--text-3);margin:4px 0 12px;}
</style>
</head>
<body>
<template id="main">
  <div class="page">
    <h1 class="h1">Events</h1>
    <p class="lead">Conferences, workshops, and FOAMfrat gatherings.</p>
    <div class="egrid" id="ev"></div>
  </div>
</template>
<script>STUDIO_PAGE='events';</script>
<script src="studio-shell.js"></script>
<script>
const E=[
  ["FOAMfrat Conference 2026","Minneapolis, MN · Sep 18–20","linear-gradient(135deg,#243b55,#141e30)"],
  ["Critical Care Transport Symposium","Denver, CO · Oct 3","linear-gradient(135deg,#1d3a2a,#10261a)"],
  ["Airway Cadaver Lab","Chicago, IL · Nov 12","linear-gradient(135deg,#3a1c1c,#2b1810)"],
  ["Resus Rodeo Workshop","Austin, TX · Dec 5","linear-gradient(135deg,#332a4d,#1b1530)"]
];
document.getElementById('ev').innerHTML=E.map(([t,m,g])=>`
  <div class="ev"><div class="art" style="background:${g}">${t}</div>
  <div class="b"><div class="t">${t}</div><div class="m">${m}</div>
  <button class="btn ghost" style="width:100%">View details</button></div></div>`).join('');
</script>
</body>
</html>
