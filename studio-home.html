<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Self-Paced — FOAMfrat Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="studio.css" />
<style>
  .hero{position:relative;border-radius:0;height:340px;margin:-28px -34px 8px;overflow:hidden;display:flex;align-items:center;}
  .hero .bgwrap{position:absolute;inset:0;background:linear-gradient(120deg,#2a3340,#3a2f24 55%,#52341f);}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(10,10,10,.92) 0%,rgba(10,10,10,.6) 45%,rgba(10,10,10,.15) 75%,transparent 100%);}
  .hero .inner{position:relative;z-index:2;padding:0 44px;max-width:620px;}
  .hero .k{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.7);}
  .hero h1{font-size:46px;font-weight:700;margin:8px 0 6px;}
  .hero p{font-size:15px;color:rgba(255,255,255,.82);margin:0 0 20px;}
  .dots{position:absolute;bottom:16px;left:0;right:0;display:flex;gap:7px;justify-content:center;z-index:2;}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);}
  .dots i.on{background:#fff;}
</style>
</head>
<body>
<template id="main">
  <div class="page">
    <div class="hero">
      <div class="bgwrap"></div><div class="scrim"></div>
      <div class="inner">
        <div class="k">Featured Series</div>
        <h1>Pulmo Machina</h1>
        <p>The FOAMfrat Mechanical Ventilation Series — a creative guide to mechanical ventilation.</p>
        <a class="btn yellow" href="studio-classroom.html"><span class="material-icons">play_arrow</span>Go to Series</a>
      </div>
      <div class="dots"><i class="on"></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>
    <div id="rows"></div>
  </div>
</template>
<script>STUDIO_PAGE='home';</script>
<script src="studio-shell.js"></script>
<script>
const CDN="https://d29e3091pe8039.cloudfront.net/public/";
const ROWS=[
  ["Airway / Respiratory / Ventilation",[
    ["Understanding COPD","3a417ef2-1048-46d4-ae35-1039c5d860da.jpg"],
    ["The Advanced Airway Course","9f4c5607-f017-45f9-8442-759e01cfed8d.jpg"],
    ["The Airway Assistant Course","4f74a11e-86ab-442a-a218-efc073527892.jpg"],
    ["Endotracheal Intubation","283a33c2-19f3-49bf-bf45-b755ed733579.jpg"],
    ["Training For Surgical Cricothyrotomy","8969df5b-b60f-4c85-ab69-7c641233ab9b.jpg"],
    ["RSI Cocktail","8ffa6e01-eb62-4b00-a540-e66117d842ba.jpg"],
    ["Laryngoscopy Micro Skills","10dff89a-b3c5-481f-a804-3a9442e402ef.jpg"],
    ["Respiratory Pharmacopeia","7ae37d78-9529-4334-a7ad-a92fd9840833.jpg"],
    ["Distress vs Failure, Treading Water","7c7ae05f-dea8-4dfe-a53d-1b546da48139.jpg"]
  ]],
  ["Cardiovascular",[
    ["Sinus Tachycardia","0918f90b-77f0-47e9-94a1-643907bf0385.jpg"],
    ["Understanding CPR","aaff9a19-20b0-4615-8102-d252bce157f2.jpg"]
  ]],
  ["Trauma",[
    ["Trauma Anesthesia","f8d27f81-02e8-4e38-94a0-8f7efc2dc959.jpg"],
    ["Blood Transfusion and Resuscitation","42a9808f-1627-435c-9884-e051510d3bbf.jpg"],
    ["Ultrasound & The FAST Exam","13c63d43-b5dc-41fb-afa6-0218398659a0.jpg"]
  ]],
  ["Recently Added",[

    ["Casualties: Basic Airways - Episode 2","9636c837-c1b7-4172-a751-413158b9374a.jpg"]
  ]]
];
function tile(c){
  return `<a class="tile" href="studio-classroom.html">
    <div class="art" style="background:#11151a url('${CDN+c[1]}') center/cover"></div>
    <span class="dots"><span class="material-icons" style="font-size:18px">more_vert</span></span>
    <div class="cap"><div class="t">${c[0]}</div><div class="m">FOAMfrat · CE</div></div>
  </a>`;
}
document.getElementById('rows').innerHTML = ROWS.map(r=>
  `<div class="rowhead"><h2>${r[0]}</h2><span class="viewall">View all</span></div>
   <div class="shelf">${r[1].map(tile).join('')}</div>`
).join('');
</script>
</body>
</html>
